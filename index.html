<style>
/* ===================== DESIGN TOKENS ===================== */
:root{
  --bg-void:#0A0E13;
  --bg-void-2:#0D131A;
  --surface:#141A22;
  --surface-raised:#1B222C;
  --surface-hover:#212a36;
  --border:#242E3A;
  --border-soft:#1B232D;
  --accent:#E8661C;
  --accent-soft:rgba(232,106,28,.14);
  --accent-text:#FF9152;
  --info:#4FA3FF;
  --info-soft:rgba(79,163,255,.14);
  --text:#EDEFF3;
  --text-dim:#B7C0CC;
  --text-muted:#7C8798;
  --success:#34D399;
  --success-soft:rgba(52,211,153,.14);
  --warning:#FBBF24;
  --warning-soft:rgba(251,191,36,.14);
  --caution:#FB923C;
  --caution-soft:rgba(251,146,60,.14);
  --danger:#F04438;
  --danger-soft:rgba(240,68,56,.14);
  --danger-dark:#B42318;
  --danger-dark-soft:rgba(180,35,24,.20);
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:16px;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --shadow-card: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px -12px rgba(0,0,0,.6);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(232,106,28,.08), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(79,163,255,.06), transparent 55%),
    var(--bg-void);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#33404f;}
a{color:inherit;}
:focus-visible{outline:2px solid var(--info);outline-offset:2px;border-radius:4px;}

h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;letter-spacing:.2px;margin:0;}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);}
.mono{font-family:var(--font-mono);}

/* ===================== APP SHELL ===================== */
.app-shell{display:flex;min-height:100vh;}
.sidebar{
  width:72px;flex:0 0 72px;
  background:linear-gradient(180deg,var(--bg-void-2),#0A0E13);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:4px;position:sticky;top:0;height:100vh;z-index:20;
  transition:width .18s ease, flex-basis .18s ease;overflow:hidden;
}
.sidebar:hover{width:220px;flex-basis:220px;align-items:stretch;}
.sidebar-logo{
  display:flex;align-items:center;gap:10px;padding:6px 14px 18px 14px;white-space:nowrap;
}
.sidebar-logo .mark{
  width:34px;height:34px;border-radius:9px;flex:0 0 34px;
  background:linear-gradient(135deg,var(--accent),#a8480f);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:17px;color:#fff;
  box-shadow:0 4px 14px -4px rgba(232,106,28,.6);
}
.sidebar-logo .word{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:.3px;opacity:0;transition:opacity .15s;}
.sidebar-logo .sub{display:block;font-size:10px;color:var(--text-muted);font-family:var(--font-body);font-weight:500;opacity:0;transition:opacity .15s;}
.sidebar:hover .word,.sidebar:hover .sub{opacity:1;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 19px;margin:1px 8px;border-radius:var(--radius-sm);
  color:var(--text-muted);cursor:pointer;white-space:nowrap;font-size:14px;font-weight:500;
  border:1px solid transparent;
}
.nav-item svg{flex:0 0 18px;width:18px;height:18px;}
.nav-item:hover{background:var(--surface-raised);color:var(--text);}
.nav-item.active{background:var(--accent-soft);color:var(--accent-text);border-color:rgba(232,106,28,.25);}
.nav-item .label{opacity:0;transition:opacity .12s;}
.sidebar:hover .nav-item .label{opacity:1;}
.nav-sep{height:1px;background:var(--border-soft);margin:8px 16px;}
.nav-spacer{flex:1;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  position:sticky;top:0;z-index:15;
  display:flex;align-items:center;gap:16px;
  padding:14px 28px;border-bottom:1px solid var(--border-soft);
  background:rgba(10,14,19,.82);backdrop-filter:blur(10px);
}
.topbar h1{font-size:22px;}
.topbar-logo{display:none;}
.topbar .ctx{color:var(--text-muted);font-size:13px;font-family:var(--font-mono);}
.topbar .spacer{flex:1;}
.select, select, input, textarea{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:8px 11px;font-family:var(--font-body);font-size:13.5px;
}
select:focus,input:focus,textarea:focus{border-color:var(--info);}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface-raised);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:9px 14px;font-size:13.5px;font-weight:600;
  cursor:pointer;font-family:var(--font-body);
}
.btn:hover{background:var(--surface-hover);}
.btn-accent{background:linear-gradient(135deg,var(--accent),#b8501a);border-color:transparent;color:#fff;}
.btn-accent:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border-color:var(--border);}
.btn-sm{padding:6px 10px;font-size:12.5px;}
.btn-danger{color:var(--danger);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.content{padding:24px 28px 60px 28px;max-width:1520px;width:100%;margin:0 auto;}
.tab-panel{display:none;animation:fadein .18s ease;}
.tab-panel.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.panel-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.panel-head h2{font-size:26px;}
.panel-head p{margin:4px 0 0 0;color:var(--text-muted);font-size:13.5px;}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

.card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);padding:18px 20px;
}
.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title h3{font-size:15px;font-family:var(--font-body);font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;}

.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}}
@media(max-width:640px){.grid-4,.grid-3{grid-template-columns:1fr;}}

/* Scoreboard KPI */
.kpi{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-lg);
  padding:16px 18px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;
}
.kpi .eyebrow{margin-bottom:6px;}
.kpi .value{font-family:var(--font-display);font-weight:800;font-size:40px;line-height:1;display:flex;align-items:baseline;gap:6px;}
.kpi .value .unit{font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--text-muted);}
.kpi .delta{margin-top:6px;font-size:12px;color:var(--text-muted);font-family:var(--font-mono);}
.kpi .dot{position:absolute;top:16px;right:16px;width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 4px currentColor22;}
.kpi.tone-success .dot,.kpi.tone-success .value{color:var(--success);}
.kpi.tone-warning .dot,.kpi.tone-warning .value{color:var(--warning);}
.kpi.tone-danger .dot,.kpi.tone-danger .value{color:var(--danger);}
.kpi.tone-info .dot,.kpi.tone-info .value{color:var(--info);}
.kpi.tone-accent .dot,.kpi.tone-accent .value{color:var(--accent-text);}

/* Badges / status pills */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;}
.pill .dotsm{width:7px;height:7px;border-radius:50%;background:currentColor;}
.pill-success{background:var(--success-soft);color:var(--success);}
.pill-warning{background:var(--warning-soft);color:var(--warning);}
.pill-caution{background:var(--caution-soft);color:var(--caution);}
.pill-danger{background:var(--danger-soft);color:var(--danger);}
.pill-danger-dark{background:var(--danger-dark-soft);color:#ff6b57;}
.pill-info{background:var(--info-soft);color:var(--info);}
.pill-muted{background:var(--surface-raised);color:var(--text-muted);}

/* badge for field provenance */
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:5px;font-weight:600;}
.tag-manual{background:var(--info-soft);color:var(--info);}
.tag-auto{background:var(--accent-soft);color:var(--accent-text);}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{
  text-align:left;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-muted);font-weight:600;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:10px 12px;border-bottom:1px solid var(--border-soft);vertical-align:middle;}
tbody tr{cursor:pointer;}
tbody tr:hover{background:var(--surface-raised);}
.table-wrap{overflow-x:auto;border-radius:var(--radius);}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted);}
.empty-state h4{color:var(--text-dim);font-size:17px;margin-bottom:6px;}
.empty-state p{font-size:13.5px;margin:0 0 16px 0;}

/* Forms */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:13px;}
.field label{font-size:12px;font-weight:600;color:var(--text-dim);}
.field .hint{font-size:11px;color:var(--text-muted);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:560px){.field-row,.field-row3{grid-template-columns:1fr;}}
textarea{resize:vertical;min-height:60px;font-family:var(--font-body);}

/* Slider (wellness) */
.slider-field{background:var(--surface-raised);border:1px solid var(--border-soft);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
.slider-field .sfhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.slider-field .sfhead .lbl{font-size:13px;font-weight:600;}
.slider-field .sfhead .val{font-family:var(--font-display);font-size:22px;font-weight:800;}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:4px;background:var(--border);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid #fff2;cursor:pointer;margin-top:-7px;}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:4px;}
.scale-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:4px;font-family:var(--font-mono);}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(6,9,13,.68);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:640px;width:100%;box-shadow:0 30px 60px -20px rgba(0,0,0,.7);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-soft);}
.modal-head h3{font-size:19px;}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto;}
.modal-foot{display:flex;justify-content:space-between;gap:10px;padding:16px 22px;border-top:1px solid var(--border-soft);}
.icon-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:6px;font-size:18px;line-height:1;}
.icon-btn:hover{background:var(--surface-raised);color:var(--text);}

/* Chips / filters */
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{padding:6px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface-raised);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text-dim);}
.chip.active{background:var(--accent-soft);border-color:rgba(232,106,28,.35);color:var(--accent-text);}

/* Fiche athlète */
.athlete-hero{display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-wrap:wrap;}
.avatar-ring{width:64px;height:64px;border-radius:50%;background:var(--surface-raised);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:22px;flex:0 0 64px;}
.athlete-name{font-size:28px;}
.athlete-sub{color:var(--text-muted);font-size:13px;margin-top:2px;}

.bar-track{height:8px;border-radius:5px;background:var(--border);overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;}

/* Body map */
.bodymap-wrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;}
.bodymap svg{width:180px;}
.bodymap-zone{fill:var(--surface-raised);stroke:var(--border);stroke-width:1.4;cursor:pointer;transition:fill .1s;}
.bodymap-zone:hover{fill:var(--info-soft);}
.bodymap-zone.selected{fill:var(--danger);stroke:var(--danger);}

/* Weekly planning grid */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.day-col .day-head{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;letter-spacing:.05em;}
.day-slot{background:var(--surface-raised);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;font-size:12px;cursor:pointer;min-height:54px;}
.day-slot:hover{border-color:var(--info);}
.day-slot.filled{border-style:solid;}
.day-slot .stitle{font-weight:700;margin-bottom:3px;}
.day-slot .smeta{color:var(--text-muted);font-size:11px;}
@media(max-width:1000px){.week-grid{grid-template-columns:repeat(2,1fr);}}

.help-text{color:var(--text-muted);font-size:12.5px;line-height:1.5;}
.divider{height:1px;background:var(--border-soft);margin:16px 0;}
.small-btn-row{display:flex;gap:8px;margin-top:8px;}
canvas{max-width:100%;}
.legend-row{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--text-muted);margin-top:10px;}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface-raised);border:1px solid var(--border);padding:12px 18px;border-radius:var(--radius);z-index:200;font-size:13.5px;box-shadow:0 10px 30px -10px rgba(0,0,0,.6);}
.loading-veil{position:fixed;inset:0;background:var(--bg-void);display:flex;align-items:center;justify-content:center;z-index:300;font-family:var(--font-mono);color:var(--text-muted);font-size:13px;letter-spacing:.05em;}
.priority-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
.priority-item:last-child{border-bottom:none;}
.priority-rank{font-family:var(--font-display);font-weight:800;font-size:18px;color:var(--text-muted);width:22px;}

/* Mode lien direct (email joueur) : uniquement la saisie wellness, sans navigation ni infos staff */
body.kiosk-mode .sidebar{display:none;}
body.kiosk-mode #group-filter, body.kiosk-mode #btn-demo, body.kiosk-mode #btn-reset{display:none;}
body.kiosk-mode .content{max-width:640px;}
.kiosk-banner{background:linear-gradient(135deg,var(--accent),#a8480f);color:#fff;padding:10px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:13.5px;font-weight:600;text-align:center;}

.mark-img{width:38px;height:38px;object-fit:contain;flex:0 0 38px;filter:drop-shadow(0 3px 10px rgba(232,102,28,.4));}
.loading-veil img{width:180px;margin-bottom:16px;filter:drop-shadow(0 6px 20px rgba(232,102,28,.35));}

/* ============ NAVIGATION MOBILE / TABLETTE ============
   Sur petit écran, .sidebar devient une barre d'onglets fixe en bas, toujours visible
   et lisible sans survol (le survol n'existe pas au doigt) : plus d'icônes coupées/écrasées. */
@media(max-width:860px){
  .sidebar{
    position:fixed;left:0;right:0;bottom:0;top:auto;height:66px;width:100%;
    flex:0 0 auto;flex-basis:auto;
    flex-direction:row;align-items:stretch;justify-content:flex-start;
    padding:6px 4px;overflow-x:auto;overflow-y:hidden;
    border-right:none;border-top:1px solid var(--border-soft);gap:2px;
  }
  .sidebar:hover{width:100%;flex-basis:auto;}
  .sidebar-logo,.nav-spacer,.nav-sep,#sidebar-foot{display:none;}
  .nav-item{
    flex:0 0 auto;flex-direction:column;justify-content:center;align-items:center;gap:3px;
    padding:6px 12px;margin:0;min-width:68px;border-radius:10px;
  }
  .nav-item svg{width:20px;height:20px;}
  .nav-item .label{opacity:1;font-size:9.5px;font-weight:600;white-space:nowrap;}
  .main{padding-bottom:0;}
  .content{padding:16px 14px 86px 14px;}
  .topbar{padding:12px 14px;flex-wrap:wrap;row-gap:8px;}
  .topbar-logo{display:block;width:30px;height:30px;object-fit:contain;flex:0 0 30px;filter:drop-shadow(0 2px 8px rgba(232,102,28,.4));}
  .topbar h1{font-size:19px;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3,.grid-2{grid-template-columns:1fr;}
  .week-grid{grid-template-columns:repeat(2,1fr);}
  .modal{margin-top:0;}
}
</style>

/* ---------------------- PERSISTANCE (Firebase Realtime Database) ----------------------
   Toutes les données vivent sous le nœud /fablab dans la base de données du projet
   "fab-lab-44695". Comme il n'y a pas de compte utilisateur, tout le monde qui a l'appli
   partage les mêmes données — c'est voulu (staff + tablettes joueurs voient la même chose). */

let suppressRerender = false; // évite de re-render pendant qu'on écrit nous-mêmes

async function saveCollection(name){
  try{
    await fbDB.ref('fablab/'+name).set(state[name]);
  }catch(e){ console.error('Erreur de sauvegarde', name, e); showToast('Erreur de sauvegarde ('+name+') — vérifiez la connexion internet.'); }
}
async function loadCollection(name){
  try{
    const snap = await fbDB.ref('fablab/'+name).once('value');
    const val = snap.val();
    if(val!=null){ state[name] = val; }
  }catch(e){ console.error('Erreur de chargement', name, e); }
}
async function loadAll(){
  await Promise.all(STORE_KEYS.map(loadCollection));
  if(!state.settings || !state.settings.groups || !state.settings.groups.length){
    state.settings = { groups:[...DEFAULT_GROUPS] };
  }
  // Les tableaux vides stockés dans Firebase reviennent parfois sous forme d'objet {} : on sécurise le type.
  ['players','wellness','loads','tests','sessions','planning'].forEach(k=>{
    if(!Array.isArray(state[k])) state[k] = state[k] ? Object.values(state[k]) : [];
  });
}
async function persist(name){ await saveCollection(name); }

/* Synchronisation en direct : si un autre appareil modifie une collection, on met à jour
   notre état local et on redessine l'onglet actif — sans que personne n'ait besoin de rafraîchir. */
function attachLiveSync(){
  STORE_KEYS.forEach(name=>{
    fbDB.ref('fablab/'+name).on('value', snap=>{
      if(suppressRerender) return;
      const val = snap.val();
      if(name==='settings'){
        state.settings = (val && val.groups && val.groups.length)? val : {groups:[...DEFAULT_GROUPS]};
      } else {
        state[name] = Array.isArray(val) ? val : (val? Object.values(val) : []);
      }
      if(document.getElementById('app-shell').style.visibility!=='hidden'){
        refreshGroupFilterSelect();
        renderTab(state.ui.tab);
      }
    });
  });
}

function fmtDate(d){ if(!d) return '—'; const dt = (d instanceof Date)? d : new Date(d+'T00:00:00'); if(isNaN(dt)) return d; return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDays(iso, n){ const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function isoRange(endIso, days){ const arr=[]; for(let i=days-1;i>=0;i--){ arr.push(addDays(endIso,-i)); } return arr; }
function mean(arr){ return arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function stdev(arr){ if(arr.length<2) return 0; const m=mean(arr); return Math.sqrt(mean(arr.map(v=>(v-m)*(v-m)))); }
function round1(v){ return Math.round(v*10)/10; }
function round0(v){ return Math.round(v); }
function playerName(p){ return p ? (p.firstName+' '+p.lastName.toUpperCase()) : '—'; }
function playerById(id){ return state.players.find(p=>p.id===id); }
function ageFromBirth(iso){ if(!iso) return null; const b=new Date(iso+'T00:00:00'); const t=new Date(); let a=t.getFullYear()-b.getFullYear(); const m=t.getMonth()-b.getMonth(); if(m<0||(m===0&&t.getDate()<b.getDate())) a--; return a; }
function initials(p){ return ((p.firstName||' ')[0]+(p.lastName||' ')[0]).toUpperCase(); }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// --- WELLNESS ---
// Items positifs (plus haut = mieux) et négatifs (plus haut = pire, on inverse 6-v)
const WELLNESS_POS = ['sleep','motivation','mood','freshness'];
const WELLNESS_NEG_5 = ['fatigue','soreness','stress']; // échelle 1-5
// La douleur est saisie sur une échelle 1-10 (plus précise) : on la ramène sur 1-5 avant de l'intégrer au score.
function painOn5(entry){ const p = Number(entry.pain)||1; return 1 + (p-1)*(4/9); }

function computeWellnessScore(entry){
  const pos = WELLNESS_POS.map(k=>Number(entry[k])||0);
  const neg = WELLNESS_NEG_5.map(k=>6-(Number(entry[k])||0));
  neg.push(6-painOn5(entry));
  const all = pos.concat(neg);
  return round0(mean(all)/5*100);
}

function wellnessHistory(playerId, days=28, endIso=todayISO()){
  const from = addDays(endIso, -(days-1));
  return state.wellness.filter(w=>w.playerId===playerId && w.date>=from && w.date<=endIso).sort((a,b)=>a.date.localeCompare(b.date));
}

function latestWellness(playerId){
  const list = state.wellness.filter(w=>w.playerId===playerId).sort((a,b)=>b.date.localeCompare(a.date));
  return list[0] || null;
}

// --- CHARGE ---
function dailyLoadSeries(playerId, endIso, days){
  const dates = isoRange(endIso, days);
  const byDate = {};
  state.loads.filter(l=>l.playerId===playerId).forEach(l=>{
    byDate[l.date] = (byDate[l.date]||0) + (Number(l.duration)||0)*(Number(l.rpe)||0);
  });
  return dates.map(d=>({date:d, load: byDate[d]||0}));
}

// Charge aiguë (7j) et chronique (28j) : moyennes glissantes journalières (méthode "rolling average"),
// plus robuste aux jours manquants que la somme glissante brute et davantage utilisée en pratique récente (limite les artefacts de calcul de Gabbett et al.).
function loadMetrics(playerId, endIso=todayISO()){
  const series28 = dailyLoadSeries(playerId, endIso, 28);
  const last7 = series28.slice(-7).map(d=>d.load);
  const last28 = series28.map(d=>d.load);
  const acute = mean(last7);
  const chronic = mean(last28);
  const acwr = chronic>0 ? acute/chronic : null;
  const weeklyLoad = last7.reduce((a,b)=>a+b,0);
  const sd = stdev(last7);
  const monotony = sd>0 ? mean(last7)/sd : null;
  const strain = (monotony!=null) ? weeklyLoad*monotony : null;
  return { series28, acute, chronic, acwr, weeklyLoad, monotony, strain, sd };
}

function teamAverageMetrics(endIso=todayISO()){
  const ids = playersInScope().map(p=>p.id);
  if(!ids.length) return {acute:0,chronic:0,acwr:null,weeklyLoad:0,monotony:null};
  const all = ids.map(id=>loadMetrics(id, endIso));
  return {
    acute: mean(all.map(m=>m.acute)),
    chronic: mean(all.map(m=>m.chronic)),
    acwr: mean(all.filter(m=>m.acwr!=null).map(m=>m.acwr)) || null,
    weeklyLoad: mean(all.map(m=>m.weeklyLoad)),
    monotony: mean(all.filter(m=>m.monotony!=null).map(m=>m.monotony)) || null,
    wellness: mean(ids.map(id=>{ const w=latestWellness(id); return w? computeWellnessScore(w):null; }).filter(v=>v!=null)) || null,
  };
}

// --- TESTS : deltas ---
function playerTestHistory(playerId, key){
  return state.tests.filter(t=>t.playerId===playerId && t.testKey===key).sort((a,b)=>a.date.localeCompare(b.date));
}
function testDeltas(playerId, key, value, dateExcludingId){
  const hist = playerTestHistory(playerId, key).filter(t=>t.id!==dateExcludingId);
  const def = TEST_INDEX[key];
  let deltaLast=null, pctLast=null, deltaBest=null, best=null;
  if(hist.length){
    const prev = hist[hist.length-1];
    deltaLast = round1(value - prev.value);
    pctLast = prev.value!==0 ? round1((value-prev.value)/Math.abs(prev.value)*100) : null;
    best = def.better==='lower' ? Math.min(...hist.map(t=>t.value)) : Math.max(...hist.map(t=>t.value));
    deltaBest = round1(value-best);
  }
  return {deltaLast, pctLast, deltaBest, best};
}
function latestTestValue(playerId, key){
  const hist = playerTestHistory(playerId, key);
  return hist.length? hist[hist.length-1].value : null;
}

// Points d'amélioration prioritaires : écart (normalisé, sens pris en compte) du joueur vs moyenne d'équipe sur chaque test renseigné
function priorityImprovements(playerId, limit=3){
  const scope = playersInScope().filter(p=>p.id!==playerId);
  const results = [];
  Object.values(TEST_INDEX).forEach(def=>{
    const val = latestTestValue(playerId, def.key);
    if(val==null) return;
    const teamVals = scope.map(p=>latestTestValue(p.id, def.key)).filter(v=>v!=null);
    if(teamVals.length<1) return;
    const avg = mean(teamVals);
    const sd = stdev(teamVals) || Math.abs(avg)*0.1 || 1;
    let gap = (val-avg)/sd; // z-score
    if(def.better==='lower') gap = -gap; // pour les tests "plus bas = mieux", on inverse le sens de l'écart
    results.push({ key:def.key, label: def.label, cat: def.cat, improvementLabel: IMPROVEMENT_LABELS[def.key], gap, val, avg:round1(avg), unit:def.unit });
  });
  results.sort((a,b)=>a.gap-b.gap);
  return results.slice(0, limit);
}

const chartInstances = {};
function upsertChart(canvasId, config){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  if(chartInstances[canvasId]){ chartInstances[canvasId].destroy(); }
  chartInstances[canvasId] = new Chart(canvas.getContext('2d'), config);
}
const CHART_DEFAULTS = {
  color:'#7C8798', font:{family:"'Inter',sans-serif", size:11},
  grid:'#1B232D'
};

function buildAlerts(){
  const alerts = [];
  playersInScope().forEach(p=>{
    const m = loadMetrics(p.id);
    const w = latestWellness(p.id);
    if(p.status==='blesse'){ alerts.push({playerId:p.id, tone:'danger', label:'Joueur blessé', detail:p.fragileZone||'—'}); }
    if(p.status==='alerte_charge'){ alerts.push({playerId:p.id, tone:'danger-dark', label:'Alerte charge déclarée (statut)', detail:''}); }
    if(m.acwr!=null && m.acwr>=1.5){ alerts.push({playerId:p.id, tone:'danger', label:'ACWR élevé', detail:'ACWR '+round1(m.acwr)}); }
    if(m.monotony!=null && m.monotony>=2.5){ alerts.push({playerId:p.id, tone:'caution', label:'Monotonie très élevée', detail:'Monotonie '+round1(m.monotony)}); }
    if(w){ const score = computeWellnessScore(w); if(score<40){ alerts.push({playerId:p.id, tone:'danger', label:'Wellness critique', detail:score+'/100'}); } }
  });
  return alerts;
}

function teamWeeklyLoadTrend(weeks=8){
  const out = [];
  for(let i=weeks-1;i>=0;i--){
    const endIso = addDays(todayISO(), -i*7);
    const scope = playersInScope();
    const avgWeekly = scope.length? mean(scope.map(p=>{
      const s = dailyLoadSeries(p.id, endIso, 7);
      return s.reduce((a,b)=>a+b.load,0);
    })) : 0;
    out.push({label: fmtDate(addDays(endIso,-6))+' → '+fmtDate(endIso), value: round0(avgWeekly)});
  }
  return out;
}

function teamWellnessTrend(days=14){
  const dates = isoRange(todayISO(), days);
  const scope = playersInScope();
  return dates.map(d=>{
    const vals = scope.map(p=>{
      const w = state.wellness.find(x=>x.playerId===p.id && x.date===d);
      return w? computeWellnessScore(w): null;
    }).filter(v=>v!=null);
    return {label: fmtDate(d), value: vals.length? round0(mean(vals)) : null};
  });
}

function renderTopFlopLoad(scope){
  const data = scope.map(p=>({p, acute: loadMetrics(p.id).acute})).sort((a,b)=>b.acute-a.acute);
  if(!data.length || data.every(d=>d.acute===0)) return `<p class="help-text">Pas encore de charge enregistrée sur les 7 derniers jours.</p>`;
  const max = Math.max(...data.map(d=>d.acute),1);
  const top = data.slice(0,5);
  return top.map((d,i)=>`
    <div class="priority-item" style="cursor:pointer;" onclick="openAthlete('${d.p.id}')">
      <span class="priority-rank">${i+1}</span>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;"><b>${escapeHtml(playerName(d.p))}</b><span class="mono">${round0(d.acute)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(d.acute/max*100)}%;background:${TONE_HEX[toneForACWR(loadMetrics(d.p.id).acwr).tone]};"></div></div>
      </div>
    </div>`).join('');
}

  });
  const wh = wellnessHistory(p.id,14).reduce((acc,w)=>{ acc[w.date]=computeWellnessScore(w); return acc; },{});

const WELLNESS_FIELDS = [

  {key:'freshness', label:'Fraîcheur / disponibilité'},

let wellnessDraft = {};
function resetWellnessDraft(){ wellnessDraft = {sleep:3,fatigue:3,soreness:3,stress:3,motivation:3,mood:3,freshness:3,pain:1,painZone:'',painType:'muscle',painChronicity:'aigue',comment:''}; }
resetWellnessDraft();

function renderWellness(){

          <div class="field"><label>Joueur</label><input value="${escapeHtml(playerName(kioskPlayer))}" readonly></div>

        <div class="field-row">
          <div class="field"><label>Date</label><input type="date" id="wl-date" value="${todayISO()}"></div>
          <div class="field"><label>Joueur</label>
            <select id="wl-group">${groupOptionsHtml(state.ui.groupFilter==='__all__'?'':state.ui.groupFilter,false)}</select>
          </div>
        </div>

            <div class="field"><label>Chronicité</label><select id="wl-pain-chron"><option value="aigue">Aiguë</option><option value="chronique">Chronique</option></select></div>

function sliderFieldHtml(key, label, val, min=1, max=5){
  return `<div class="slider-field">
    <div class="sfhead"><span class="lbl">${label}</span><span class="val" id="wl-val-${key}">${val}</span></div>
    <input type="range" min="${min}" max="${max}" step="1" value="${val}" id="wl-range-${key}">
    <div class="scale-labels"><span>${min}</span><span>${max}</span></div>
  </div>`;
}
function wireSlider(key, onChange){
  const range = document.getElementById('wl-range-'+key);
  if(!range) return;
  range.oninput = ()=>{ wellnessDraft[key] = Number(range.value); document.getElementById('wl-val-'+key).textContent = range.value; onChange(); };
}

// Le schéma du corps / type / chronicité ne s'affichent que s'il y a effectivement une douleur signalée (>1).
// Sans douleur, on réinitialise la zone pour ne pas garder une zone d'une saisie précédente par erreur.
function updatePainDetailsVisibility(){
  const details = document.getElementById('wl-pain-details');
  if(!details) return;
  const hasPain = Number(wellnessDraft.pain) > 1;
  details.style.display = hasPain ? 'block' : 'none';
  const hint = document.getElementById('wl-pain-hint');
  if(hint) hint.style.display = hasPain ? 'none' : 'block';
  if(!hasPain && wellnessDraft.painZone){
    wellnessDraft.painZone = '';
    const zoneLabel = document.getElementById('wl-zone-label');
    if(zoneLabel) zoneLabel.value = 'Aucune';
    document.querySelectorAll('.bodymap-zone').forEach(z=>z.classList.remove('selected'));
    document.querySelectorAll('#wl-back-zones .chip').forEach(c=>c.classList.remove('active'));
  }
}

// Lien direct : ouvre l'appli sur la seule page wellness, pré-remplie pour ce joueur.
function kioskLink(player){
  return location.origin + location.pathname + '?w=' + player.id;
}
const DEFAULT_REMINDER_MESSAGE = "N'oublie pas de remplir ton wellness du jour avant l'entraînement, ça prend 30 secondes 👇";

function renderWellnessTodayStatus(){
  const target = document.getElementById('wl-today-status');
  if(!target) return;
  const scope = playersInScope();
  const today = todayISO();
  const responded = scope.filter(p=>state.wellness.some(w=>w.playerId===p.id && w.date===today));
  const notResponded = scope.filter(p=>!responded.includes(p));

  target.innerHTML = `
    <div class="card">
      <div class="card-title">
        <h3>Réponses du jour — ${responded.length} / ${scope.length} ont répondu</h3>
        <div style="display:flex;gap:8px;">
          ${notResponded.length? `<button class="btn btn-accent btn-sm" id="wl-remind-all">✉ Relancer les ${notResponded.length} manquant(s)</button>` : ''}
          <button class="btn btn-ghost btn-sm" id="wl-toggle-compose">✉ Message groupé…</button>
        </div>
      </div>
      <div class="bar-track" style="margin-bottom:14px;">
        <div class="bar-fill" style="width:${scope.length? (responded.length/scope.length*100):0}%;background:${TONE_HEX.success};"></div>
      </div>
      ${notResponded.length? `
        <div class="chips">
          ${notResponded.map(p=>`
            <span class="chip" style="cursor:default;display:inline-flex;align-items:center;gap:8px;">
              ${escapeHtml(playerName(p))}
              ${p.email
                ? `<button class="icon-btn" data-remind="${p.id}" title="Relancer ${escapeHtml(playerName(p))} par email" style="padding:2px;">✉</button>`
                : `<span title="Aucun email renseigné" style="color:var(--text-muted);font-size:11px;">(pas d'email)</span>`}
            </span>`).join('')}
        </div>` : `<p class="help-text">Tout le monde a répondu aujourd'hui 👍</p>`}

      <div id="wl-compose-box" style="display:none;margin-top:16px;">
        <div class="divider"></div>
        <div class="field"><label>Destinataires</label>
          <select id="wl-compose-scope">
            <option value="all">Tout le groupe affiché (${scope.length})</option>
            <option value="missing" ${notResponded.length? 'selected':''}>Uniquement les non-répondants (${notResponded.length})</option>
          </select>
        </div>
        <div class="field"><label>Message</label><textarea id="wl-compose-message" placeholder="Écrivez votre message…">${DEFAULT_REMINDER_MESSAGE}</textarea></div>
        <p class="help-text">Chaque joueur reçoit aussi automatiquement son lien direct vers sa page wellness.</p>
        <button class="btn btn-accent" id="wl-compose-send">Envoyer le message groupé</button>
      </div>
    </div>
  `;

  target.querySelectorAll('[data-remind]').forEach(btn=>{
    btn.addEventListener('click', ()=>sendWellnessReminder(playerById(btn.dataset.remind), btn));
  });
  const remindAllBtn = document.getElementById('wl-remind-all');
  if(remindAllBtn){
    remindAllBtn.addEventListener('click', ()=>sendWellnessReminderBulk(notResponded, remindAllBtn, DEFAULT_REMINDER_MESSAGE));
  }
  document.getElementById('wl-toggle-compose').onclick = ()=>{
    const box = document.getElementById('wl-compose-box');
    box.style.display = box.style.display==='none' ? 'block' : 'none';
  };
  document.getElementById('wl-compose-send').onclick = (e)=>{
    const scopeSel = document.getElementById('wl-compose-scope').value;
    const msg = document.getElementById('wl-compose-message').value.trim();
    if(!msg){ showToast('Écrivez un message avant d\'envoyer.'); return; }
    const targets = scopeSel==='missing' ? notResponded : scope;
    sendWellnessReminderBulk(targets, e.target, msg);
  };
}

async function sendWellnessReminder(player, btnEl, message){
  if(!player || !player.email){ showToast('Aucun email renseigné pour ce joueur.'); return; }
  if(btnEl){ btnEl.disabled = true; btnEl.textContent = '…'; }
  try{
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: player.email,
      to_name: playerName(player),
      from_name: "Fab'Lab — Pôle PACA Handball",
      message: (message || DEFAULT_REMINDER_MESSAGE) + '\n\n' + kioskLink(player),
    });
    showToast('Message envoyé à '+playerName(player)+'.');
    if(btnEl){ btnEl.textContent = '✓'; }
  }catch(e){
    console.error(e);
    showToast("Échec de l'envoi à "+playerName(player)+' — vérifiez la config EmailJS.');
    if(btnEl){ btnEl.disabled = false; btnEl.textContent = '✉'; }
  }
}

async function sendWellnessReminderBulk(players, btnEl, message){
  const withEmail = players.filter(p=>p.email);
  const withoutEmail = players.length - withEmail.length;
  if(!withEmail.length){ showToast('Aucun email renseigné parmi les destinataires sélectionnés.'); return; }
  if(!confirmDialog(`Envoyer ce message par email à ${withEmail.length} joueur(s) ?`+(withoutEmail? ` (${withoutEmail} sans email, ignoré(s))`:''))) return;
  const originalLabel = btnEl ? btnEl.textContent : '';
  if(btnEl){ btnEl.disabled = true; btnEl.textContent = 'Envoi en cours…'; }
  let ok = 0, fail = 0;
  for(const p of withEmail){
    try{
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: p.email, to_name: playerName(p), from_name: "Fab'Lab — Pôle PACA Handball",
        message: (message || DEFAULT_REMINDER_MESSAGE) + '\n\n' + kioskLink(p),
      });
      ok++;
    }catch(e){ console.error(e); fail++; }
  }
  showToast(`${ok} message(s) envoyé(s)`+(fail?`, ${fail} échec(s)`:''));
  if(btnEl){ btnEl.disabled = false; btnEl.textContent = originalLabel; }
  renderWellnessTodayStatus();
}

/* =======================================================================
   ANALYSE DE CHARGE — aiguë / chronique / ACWR / monotonie / strain
   ======================================================================= */

function weeklyMetricTrend(playerId, weeks=8){
  const out = [];
  for(let i=weeks-1;i>=0;i--){
    const endIso = addDays(todayISO(), -i*7);
    const m = loadMetrics(playerId, endIso);
    out.push({ endIso, ...m });
  }
  return out;
}

function renderAnalyse(){
  const el = document.getElementById('tab-analyse');
  const scope = playersInScope();
  if(!scope.length){
    el.innerHTML = `<div class="panel-head"><div><h2>Analyse de charge</h2></div></div><div class="card empty-state"><h4>Aucun joueur</h4><p>Ajoutez d'abord des joueurs dans l'onglet Effectif.</p></div>`;
    return;
  }
  if(!state.ui.selectedPlayerId || !playerById(state.ui.selectedPlayerId)) state.ui.selectedPlayerId = scope[0].id;

  el.innerHTML = `
    <div class="panel-head">
      <div><h2>Analyse de charge</h2><p>Charge aiguë (moyenne glissante 7j) / chronique (moyenne glissante 28j) / ACWR / monotonie / strain.</p></div>
      <div class="panel-actions"><select id="an-player" style="min-width:220px;">${playerOptionsHtml(state.ui.selectedPlayerId, null)}</select></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <p class="help-text">
        <b>Charge aiguë</b> : moyenne glissante des charges journalières sur 7 jours. <b>Charge chronique</b> : moyenne glissante sur 28 jours.
        Ce choix (moyenne plutôt que somme brute) lisse les jours sans donnée et suit la méthode « rolling average » désormais privilégiée en pratique, plus stable que la somme glissante historique.
        <b>ACWR</b> = charge aiguë / charge chronique. <b>Monotonie</b> = moyenne des charges quotidiennes de la semaine / écart-type de ces charges. <b>Strain</b> = charge hebdomadaire totale × monotonie.
        Seuils : ACWR &lt;0,80 sous-charge · 0,80–1,30 zone cible · 1,30–1,50 vigilance · ≥1,50 alerte. Monotonie &lt;1,5 faible · 1,5–2,0 modérée · 2,0–2,5 élevée · ≥2,5 très élevée.
      </p>
    </div>

    <div id="an-body"></div>
  `;
  document.getElementById('an-player').onchange = (e)=>{ state.ui.selectedPlayerId = e.target.value; renderAnalyseBody(); };
  renderAnalyseBody();
}

function renderTestEvolChart(){
  const playerId = state.ui.selectedPlayerId;
  const key = state.ui.selectedTestKey || document.getElementById('te-testkey')?.value || 'vma';
  const hist = playerTestHistory(playerId, key);
  const def = TEST_INDEX[key];
  upsertChart('chart-test-evol', {
    type:'line',
    data:{ labels:hist.map(t=>fmtDate(t.date)), datasets:[{ label:def.label, data:hist.map(t=>t.value), borderColor:'#E8661C', backgroundColor:'rgba(232,106,28,.12)', fill:true, tension:.25, pointRadius:4 }] },
    options:{ plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:CHART_DEFAULTS.color},grid:{display:false}}, y:{ticks:{color:CHART_DEFAULTS.color},grid:{color:CHART_DEFAULTS.grid}, title:{display:true,text:def.unit,color:CHART_DEFAULTS.color}} } }
  });
}

function renderTestSummary(){
  const target = document.getElementById('te-summary');
  const playerId = state.ui.selectedPlayerId;
  const rows = Object.values(TEST_INDEX).map(def=>{
    const val = latestTestValue(playerId, def.key);
    if(val==null) return null;
    const d = testDeltas(playerId, def.key, val, null);
    return {def, val, d};
  }).filter(Boolean);
  if(!rows.length){ target.innerHTML = `<p class="help-text">Aucun test enregistré pour ce joueur.</p>`; return; }
  target.innerHTML = rows.map(r=>`
    <div class="priority-item">
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;"><b>${r.def.label}</b><span class="mono">${r.val} ${r.def.unit}</span></div>
        <div class="help-text">delta dernier : ${r.d.deltaLast!=null? (r.d.deltaLast>0?'+':'')+r.d.deltaLast : '—'} · meilleur : ${r.d.best??'—'}</div>
      </div>
    </div>`).join('');
}

function renderTestHistory(){
  const target = document.getElementById('te-history');
  const list = [...state.tests].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,25);
  if(!list.length){ target.innerHTML = `<div class="empty-state"><h4>Aucun test</h4><p>Ajoutez une première mesure.</p></div>`; return; }
  target.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Joueur</th><th>Test</th><th>Valeur</th><th>Δ dernier</th><th>% évol.</th><th>Δ meilleur</th><th></th></tr></thead><tbody>
    ${list.map(t=>{
      const p = playerById(t.playerId); const def = TEST_INDEX[t.testKey];
      const d = testDeltas(t.playerId, t.testKey, t.value, t.id);
      const goodDelta = d.deltaLast==null? true : (def.better==='higher'? d.deltaLast>=0 : d.deltaLast<=0);
      return `<tr data-id="${t.id}"><td>${fmtDate(t.date)}</td><td><b>${escapeHtml(playerName(p))}</b></td><td>${def.label}</td><td class="mono">${t.value} ${def.unit}</td>
        <td>${d.deltaLast!=null? pill((d.deltaLast>0?'+':'')+d.deltaLast, goodDelta?'success':'danger') : '—'}</td>
        <td class="mono">${d.pctLast!=null?(d.pctLast>0?'+':'')+d.pctLast+'%':'—'}</td>
        <td class="mono">${d.deltaBest!=null?d.deltaBest:'—'}</td>
        <td style="text-align:right;"><button class="icon-btn btn-danger" data-act="del">🗑</button></td></tr>`;
    }).join('')}
  </tbody></table></div>`;
  target.querySelectorAll('tbody tr').forEach(tr=>{
    tr.querySelector('[data-act=del]').addEventListener('click', ()=>{
      if(confirmDialog('Supprimer ce test ?')){ state.tests = state.tests.filter(x=>x.id!==tr.dataset.id); persist('tests'); renderTests(); }
    });
  });
}

function openTestForm(){
  const t = {id:uid('ts'), date:todayISO(), playerId:state.ui.selectedPlayerId, testKey: state.ui.selectedTestKey||'vma', period:'', comment:''};
  openModal({
    title:'Nouveau test physique',
    bodyHtml:`
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" name="date" value="${t.date}"></div>
        <div class="field"><label>Joueur</label><select name="playerId">${playerOptionsHtml(t.playerId,null)}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Test</label><select name="testKey" id="tf-key">${testOptionsHtml(t.testKey)}</select></div>
        <div class="field"><label>Valeur (<span id="tf-unit">${TEST_INDEX[t.testKey].unit}</span>)</label><input type="number" step="0.01" name="value" required id="tf-value"></div>
      </div>
      <div class="field"><label>Période</label><input name="period" placeholder="ex : pré-saison, mi-saison…"></div>
      <div class="field"><label>Commentaire</label><textarea name="comment"></textarea></div>
      <div id="tf-preview" class="help-text"></div>
    `,
    onMount:()=>{
      const keySel = document.getElementById('tf-key'), valInput = document.getElementById('tf-value'), unitSpan=document.getElementById('tf-unit');
      const updatePreview = ()=>{
        unitSpan.textContent = TEST_INDEX[keySel.value].unit;
        const v = Number(valInput.value);
        const pid = document.querySelector('[name=playerId]').value;
        if(!isNaN(v) && v!==0 && pid){
          const d = testDeltas(pid, keySel.value, v, null);
          document.getElementById('tf-preview').textContent = d.deltaLast!=null? `Delta vs dernier test : ${d.deltaLast>0?'+':''}${d.deltaLast} — vs meilleur : ${d.deltaBest}` : 'Premier test enregistré pour ce joueur sur cet exercice.';
        }
      };
      keySel.onchange = updatePreview; valInput.oninput = updatePreview; document.querySelector('[name=playerId]').onchange = updatePreview;
    },
    onSubmit: async (fd, close)=>{
      const upd = {...t};
      ['date','playerId','testKey','period','comment'].forEach(k=>upd[k]=fd.get(k));
      upd.value = Number(fd.get('value'));
      if(!upd.playerId){ showToast('Sélectionnez un joueur.'); return; }
      state.tests.push(upd);
      await persist('tests'); close();
      state.ui.selectedPlayerId = upd.playerId; state.ui.selectedTestKey = upd.testKey;
      renderTests();
      showToast('Test enregistré.');
    }
  });
}

const DAY_LABELS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const INTENSITY_LEVELS = [ {label:'Faible',tone:'success'}, {label:'Modérée',tone:'warning'}, {label:'Forte',tone:'caution'}, {label:'Très forte',tone:'danger'} ];
const ANNUAL_TYPES = [ {label:'Charge',tone:'caution'}, {label:'Décharge',tone:'success'}, {label:'Test',tone:'info'}, {label:'Compétition',tone:'accent'}, {label:'Reprise',tone:'warning'} ];

function startOfWeek(iso){ const d = new Date(iso+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
if(!state.ui.planningWeekStart) state.ui.planningWeekStart = startOfWeek(todayISO());

function renderPlanning(){
  const el = document.getElementById('tab-planning');
  const weekStart = state.ui.planningWeekStart;
  const days = [...Array(7)].map((_,i)=>addDays(weekStart,i));
  const weeklyEntries = state.planning.filter(x=>x.kind!=='annual');
  const annualEntries = state.planning.filter(x=>x.kind==='annual').sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));

  el.innerHTML = `
    <div class="panel-head">
      <div><h2>Planning</h2><p>Planning hebdomadaire terrain + vue macro de la saison.</p></div>
    </div>

    <div class="card" style="margin-bottom:22px;">
      <div class="card-title">
        <h3>Semaine du ${fmtDate(weekStart)} au ${fmtDate(addDays(weekStart,6))}</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" id="pl-prev">← Semaine préc.</button>
          <button class="btn btn-ghost btn-sm" id="pl-today">Aujourd'hui</button>
          <button class="btn btn-ghost btn-sm" id="pl-next">Semaine suiv. →</button>
        </div>
      </div>
      <div class="week-grid">
        ${days.map((d,i)=>{
          const entries = weeklyEntries.filter(e=>e.date===d);
          return `<div class="day-col">
            <div class="day-head">${DAY_LABELS[i]}<br><span class="mono">${fmtDate(d)}</span></div>
            ${entries.map(e=>{
              const intensity = INTENSITY_LEVELS.find(x=>x.label===e.intensity) || {tone:'muted'};
              return `<div class="day-slot filled" data-id="${e.id}" style="border-color:${TONE_HEX[intensity.tone]};">
                <div class="stitle">${escapeHtml(e.objective||e.sessionName||'Séance')}</div>
                <div class="smeta">${escapeHtml(e.group||'')} ${e.duration?'· '+e.duration+' min':''}</div>
                <div style="margin-top:4px;">${pill(e.intensity||'—', intensity.tone)}</div>
              </div>`;
            }).join('')}
            <div class="day-slot" data-newday="${d}">+ Ajouter</div>
          </div>`;
        }).join('')}
      </div>
      <div class="legend-row">${INTENSITY_LEVELS.map(l=>`<span><span class="legend-dot" style="background:${TONE_HEX[l.tone]}"></span>${l.label}</span>`).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title"><h3>Planification annuelle — macro-cycles</h3>
        <button class="btn btn-accent btn-sm" id="btn-add-annual">+ Ajouter un cycle</button>
      </div>
      ${annualEntries.length? annualEntries.map(a=>{
        const type = ANNUAL_TYPES.find(t=>t.label===a.type)||{tone:'muted'};
        return `<div class="priority-item" data-id="${a.id}" style="cursor:pointer;">
          <span class="pill ${toneClass(type.tone)}">${escapeHtml(a.type||'—')}</span>
          <div style="flex:1;">
            <div style="font-weight:600;">${escapeHtml(a.label)} <span class="help-text">(${fmtDate(a.startDate)} → ${fmtDate(a.endDate)})</span></div>
            <div class="help-text">${escapeHtml(a.objective||'')}</div>
          </div>
        </div>`;
      }).join('') : `<p class="help-text">Aucun cycle défini. Ajoutez vos périodes de charge/décharge, tests et compétitions pour piloter la saison.</p>`}
    </div>
  `;

  document.getElementById('pl-prev').onclick = ()=>{ state.ui.planningWeekStart = addDays(weekStart,-7); renderPlanning(); };
  document.getElementById('pl-next').onclick = ()=>{ state.ui.planningWeekStart = addDays(weekStart,7); renderPlanning(); };
  document.getElementById('pl-today').onclick = ()=>{ state.ui.planningWeekStart = startOfWeek(todayISO()); renderPlanning(); };
  document.getElementById('btn-add-annual').onclick = ()=>openAnnualForm();
  el.querySelectorAll('.day-slot[data-newday]').forEach(s=>s.addEventListener('click',()=>openPlanningForm(null, s.dataset.newday)));
  el.querySelectorAll('.day-slot.filled').forEach(s=>s.addEventListener('click',()=>openPlanningForm(weeklyEntries.find(e=>e.id===s.dataset.id))));
  el.querySelectorAll('[data-id]').forEach(row=>{
    if(row.classList.contains('day-slot')) return;
    row.addEventListener('click', ()=>{ const a = annualEntries.find(x=>x.id===row.dataset.id); if(a) openAnnualForm(a); });
  });
}

async function loadDemoData(){
  if(state.players.length && !confirmDialog('Des données existent déjà. Ajouter des données de démonstration en complément ?')) return;
  const groups = state.settings.groups.length? state.settings.groups : [...DEFAULT_GROUPS];
  const firstNames = ['Lucas','Nathan','Enzo','Yanis','Mathis','Rayan','Tom','Adam','Noah','Léo','Hugo','Sacha'];
  const lastNames = ['Martin','Bernard','Dubois','Moreau','Laurent','Simon','Michel','Girard','Faure','Roux','Fontaine','Blanc'];
  const newPlayers = [];
  for(let i=0;i<12;i++){
    const id = uid('pl');
    newPlayers.push({
      id, group: groups[i%groups.length], firstName:firstNames[i], lastName:lastNames[i],
      birthDate: `${2003+(i%6)}-0${1+(i%9)%9}-1${i%9}`, pvc:'PVC-'+(1000+i),
      position: POSITIONS[i%POSITIONS.length], hand: HANDS[i%2],
      height: 178+ (i%10), weight: 74+(i%14), wingspan: 180+(i%12),
      status: i===2? 'blesse' : (i===5? 'retour_progressif' : (i===8?'moyen':'en_forme')),
      statusDate: todayISO(), returnDate: i===2? addDays(todayISO(),21): '',
      fragileZone: i===2? 'Ischio-jambiers G' : '', injuryHistory: i===2? 'Élongation ischio G — IRM le '+addDays(todayISO(),-10) : '',
      availability: i===2?'Indisponible':(i===5?'Limité':'Disponible'), comment:''
    });
  }
  state.players.push(...newPlayers);
  await persist('players');

  // Wellness sur 21 jours
  newPlayers.forEach(p=>{
    for(let d=20; d>=0; d--){
      const date = addDays(todayISO(), -d);
      const base = 3 + Math.sin(d/3 + p.firstName.length)*1.1;
      const clamp = v=>Math.max(1,Math.min(5,Math.round(v)));
      state.wellness.push({
        id: uid('wl'), date, group:p.group, playerId:p.id,
        sleep:clamp(base+ (Math.random()-.5)), fatigue:clamp(3-(base-3)+(Math.random()-.5)),
        soreness:clamp(2.6+(Math.random()-.5)), stress:clamp(2.4+(Math.random()-.5)),
        motivation:clamp(base+.4+(Math.random()-.5)), mood:clamp(base+(Math.random()-.5)),
        freshness:clamp(base-.2+(Math.random()-.5)), pain: (p.status==='blesse'&&d<5)?clamp(3.5+Math.random()):1,
        painZone: (p.status==='blesse'&&d<5)?'cuisse_g':'', painType:'muscle', painChronicity:'aigue', comment:''
      });
    }
  });
  await persist('wellness');

  // Charge sur 35 jours
  const sTypes = SESSION_TYPES;
  newPlayers.forEach((p,pi)=>{
    for(let d=34; d>=0; d--){
      if(d%7===5 || d%7===6) continue; // repos le WE
      const date = addDays(todayISO(), -d);
      const spike = (pi===7 && d<7) ? 1.6 : 1; // pic de charge simulé sur un joueur
      state.loads.push({
        id: uid('ld'), date, group:p.group, playerId:p.id,
        sessionType: sTypes[(d+pi)%sTypes.length], sessionCode:'S'+((d+pi)%12), sessionName:'Séance '+sTypes[(d+pi)%sTypes.length],
        duration: Math.round((55+((d+pi)%20))*spike), rpe: Math.min(10, Math.round((4+((d+pi)%5))*spike)),
        available:'oui', participation:'Complète', painReported:false, comment:''
      });
    }
  });
  await persist('loads');

  // Tests physiques (2 sessions : pré-saison / actuel)
  newPlayers.forEach((p,pi)=>{
    const testKeys = Object.keys(TEST_INDEX);
    testKeys.forEach(key=>{
      const def = TEST_INDEX[key];
      const baseVal = def.unit==='s'? (def.key==='sprint5'?1.05:(def.key==='sprint10'?1.85:3.15)) :
                      def.unit==='km/h'? 14.5 : def.unit==='ms'? 220 : def.unit==='ratio'? 1.4 : def.unit==='kg'? 90 : 38;
      const variance = pi*0.4 - 2;
      state.tests.push({id:uid('ts'), date: addDays(todayISO(),-70), playerId:p.id, testKey:key, value: round1(baseVal + variance*(def.better==='lower'?-0.03:0.6)), period:'Pré-saison', comment:''});
      state.tests.push({id:uid('ts'), date: addDays(todayISO(),-7), playerId:p.id, testKey:key, value: round1(baseVal + variance*(def.better==='lower'?-0.03:0.6) + (def.better==='lower'?-0.04:0.8)), period:'Mi-saison', comment:''});
    });
  });
  await persist('tests');

  // Bibliothèque de séances
  state.sessions.push(
    {id:uid('se'), code:'MU-01', name:'Force max bas du corps', objective:'Développer la force maximale', dominant:'Force', subDominant:'Force maximale', category:'Collectif', difficulty:7, rpeTarget:8, duration:60, targetGroupSize:'8-12', group:'', equipment:'Barres, squat rack', description:'Squat, soulevé de terre roumain, presse — séries longues à charge élevée.', constraints:'Éviter en période de match rapprochée', variant:'Version isométrique pour retour progressif', compatibleReturn:false, compatibleInjured:false},
    {id:uid('se'), code:'VI-02', name:'Vitesse & réactivité', objective:'Améliorer l’accélération 0-10m', dominant:'Vitesse', subDominant:'Accélération', category:'Petit groupe', difficulty:6, rpeTarget:7, duration:40, targetGroupSize:'4-6', group:'', equipment:'Plots, chronomètre', description:'Sprints courts résistés, starts variés, drills de fréquence gestuelle.', constraints:'Terrain sec requis', variant:'', compatibleReturn:true, compatibleInjured:false},
    {id:uid('se'), code:'PR-03', name:'Prévention épaule/gainage', objective:'Prévenir les blessures épaule et tronc', dominant:'Récupération', subDominant:'Prévention', category:'Individualisé', difficulty:3, rpeTarget:4, duration:25, targetGroupSize:'1', group:'', equipment:'Élastiques, tapis', description:'Rotateurs externes, gainage dynamique, mobilité scapulaire.', constraints:'', variant:'Adaptable en charge partielle', compatibleReturn:true, compatibleInjured:true},
    {id:uid('se'), code:'CA-04', name:'Endurance aérobie continue', objective:'Développer la capacité aérobie', dominant:'Endurance', subDominant:'Aérobie continue', category:'Collectif', difficulty:5, rpeTarget:6, duration:35, targetGroupSize:'12+', group:'', equipment:'Aucun', description:'Footing continu à intensité modérée + gammes.', constraints:'', variant:'Vélo si retour progressif', compatibleReturn:true, compatibleInjured:false},
  );
  await persist('sessions');

  // Planning semaine courante + macro-cycles
  const ws = startOfWeek(todayISO());
  [0,1,2,3,4].forEach((offset,i)=>{
    state.planning.push({id:uid('pw'), kind:'weekly', date: addDays(ws,offset), slot:'17h30', group:groups[0], sessionId: state.sessions[i%state.sessions.length].id,
      sessionName: state.sessions[i%state.sessions.length].name, objective: state.sessions[i%state.sessions.length].objective,
      dominant: state.sessions[i%state.sessions.length].dominant, intensity: INTENSITY_LEVELS[i%4].label, duration:60, location:'Salle musculation', responsible:'Préparateur physique', remark:''});
  });
  state.planning.push({id:uid('pa'), kind:'annual', label:'Reprise pré-saison', startDate: addDays(todayISO(),-14), endDate: addDays(todayISO(),-1), type:'Reprise', objective:'Réathlétisation générale, volume progressif.'});
  state.planning.push({id:uid('pa'), kind:'annual', label:'Bloc de charge #1', startDate: todayISO(), endDate: addDays(todayISO(),20), type:'Charge', objective:'Accumulation force + vitesse avant premiers matchs.'});
  state.planning.push({id:uid('pa'), kind:'annual', label:'Semaine de tests', startDate: addDays(todayISO(),21), endDate: addDays(todayISO(),27), type:'Test', objective:'Batterie de tests physiques complète.'});
  await persist('planning');

  refreshGroupFilterSelect();
  showToast('Données de démonstration chargées.');
  renderTab(state.ui.tab);
}

async function resetAllData(){
  if(!confirmDialog('Cette action supprime définitivement toutes les données de Fab\'Lab (joueurs, wellness, charge, tests, séances, planning), sur tous les appareils. Continuer ?')) return;
  suppressRerender = true;
  for(const name of STORE_KEYS){
    try{ await fbDB.ref('fablab/'+name).remove(); }catch(e){ console.error(e); }
  }
  state.players=[]; state.wellness=[]; state.loads=[]; state.tests=[]; state.sessions=[]; state.planning=[];
  state.settings = {groups:[...DEFAULT_GROUPS]};
  await persist('settings');
  suppressRerender = false;
  refreshGroupFilterSelect();
  showToast('Toutes les données ont été réinitialisées.');
  renderTab(state.ui.tab);
}

/* =======================================================================
   BOOTSTRAP
   ======================================================================= */

async function boot(){
  await loadAll();
  renderSidebarFiltered();
  refreshGroupFilterSelect();
  updateTopbarCtx();

  if(IS_KIOSK && playerById(KIOSK_PLAYER_ID)){
    document.body.classList.add('kiosk-mode');
    state.ui.selectedPlayerId = KIOSK_PLAYER_ID;
    document.getElementById('topbar-title').textContent = 'Wellness';
    document.getElementById('tab-wellness').classList.add('active');
    renderWellness();
  } else {
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.tab==='dashboard'));
    document.getElementById('topbar-title').textContent = 'Dashboard';
    document.getElementById('tab-dashboard').classList.add('active');
    renderDashboard();
  }

  document.getElementById('btn-demo').addEventListener('click', loadDemoData);
  document.getElementById('btn-reset').addEventListener('click', resetAllData);

  document.getElementById('loading-veil').style.display='none';
  document.getElementById('app-shell').style.visibility='visible';

  attachLiveSync();
}

boot();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

function comparisonBar(label, val, teamVal, toneFn){
  const tone = toneFn? toneFn(val).tone : 'accent';
  const max = Math.max(val||0, teamVal||0, 1)*1.15;
  return `<div>
    <div class="help-text" style="margin-bottom:6px;font-weight:600;color:var(--text-dim);">${label}</div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>Joueur</span><span class="mono">${val!=null?round1(val):'—'}</span></div>
    <div class="bar-track" style="margin-bottom:8px;"><div class="bar-fill" style="width:${val!=null?(val/max*100):0}%;background:${TONE_HEX[tone]};"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>Groupe</span><span class="mono">${teamVal!=null?round1(teamVal):'—'}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${teamVal!=null?(teamVal/max*100):0}%;background:${TONE_HEX.muted};"></div></div>
  </div>`;
}
</script>
